<head>

    if ('serviceWorker' in navigator) {

<title>نموذج متابعة المستشفيات </title>
<style>
    body { font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif; }
    :root {
        --primary: #1a6faf;
        --primary-dark: #14578a;
        --primary-light: #e8f2fb;
        --primary-mid: #c6dff5;
        --accent: #e8a020;
        --accent-light: #fef3dc;
        --green: #1a8a4a;
        --green-light: #e3f5eb;
        --red: #c0392b;
        --red-light: #fdecea;
        --orange: #d35400;
        --orange-light: #fef0e7;
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #f7f9fc;
        --border: #d4dde8;
        --border-light: #e8eef5;
        --text: #1a2533;
        --text-muted: #5a6a7e;
        --text-dim: #8a9ab0;
        --shadow-sm: 0 1px 4px rgba(26,111,175,0.08);
        --shadow: 0 2px 12px rgba(26,111,175,0.12);
        --shadow-lg: 0 4px 24px rgba(26,111,175,0.15);
        --radius: 12px;
        --radius-sm: 8px;
        --header-h: 60px;
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --mob-nav-h: calc(58px + var(--safe-area-bottom));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; min-height: -webkit-fill-available; background: var(--bg); color: var(--text); direction: rtl; font-size: 14px; }
    body.menu-open { overflow: hidden; }

    /* ========== HEADER ========== */
    .app-header {
        position: fixed; top: 0; right: 0; left: 0; height: var(--header-h);
        background: var(--primary); display: flex; align-items: center; gap: 12px;
        padding: 0 16px; z-index: 200; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .header-logo .icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-titles { display: flex; flex-direction: column; min-width: 0; }
    .header-titles .t1 { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-titles .t2 { font-size: 10px; color: rgba(255, 255, 255, 0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
    @media (min-width: 600px) { .header-titles .t2 { display: block; } }
    
    .header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .hbtn { height: 34px; padding: 0 12px; border-radius: 7px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
    .hbtn-ghost { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .hbtn-accent { background: var(--accent); color: #fff; }
    @media (max-width: 599px) { .hbtn-desktop { display: none; } }

    /* ========== PROGRESS & LAYOUT ========== */
    .global-progress { position: fixed; top: var(--header-h); right: 0; left: 0; height: 4px; background: var(--primary-mid); z-index: 199; }
    .global-progress-fill { height: 100%; background: var(--accent); transition: width 0.4s; }

    .app-layout { position: fixed; top: calc(var(--header-h) + 4px); bottom: 0; right: 0; left: 0; display: flex; }

    /* ========== SIDEBAR ========== */
    .sidebar {
        width: 260px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border);
        display: flex; flex-direction: column; overflow: hidden; transition: transform 0.25s ease-in-out;
    }
    .sidebar-inner { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .sidebar-head { padding: 12px 16px 8px; border-bottom: 1px solid var(--border-light); background: var(--primary-light); flex-shrink: 0; }
    .sidebar-head h3 { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .sidebar-total { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; flex-wrap: wrap; gap: 6px; }
    .score-big { font-size: 20px; font-weight: 900; color: var(--primary); }

    /* Navigation Items */
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border-light); transition: background 0.12s; min-height: 44px; }
    .nav-item.active { background: var(--primary-light); border-right: 3px solid var(--primary); }
    .nav-title { font-size: 12px; font-weight: 600; color: var(--text); }
    .nav-pill { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
    .pill-done { background: var(--green-light); color: var(--green); }
    .pill-partial { background: var(--orange-light); color: var(--orange); }
    .pill-empty { background: var(--border-light); color: var(--text-dim); }

    /* ========== MAIN CONTENT ========== */
    .main-content { flex: 1; overflow-y: auto; background: var(--bg); padding: 16px; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
    
    /* ========== MOBILE BOTTOM NAV ========== */
    .mobile-nav {
        position: fixed; bottom: 0; right: 0; left: 0; height: var(--mob-nav-h);
        background: var(--surface); border-top: 1px solid var(--border);
        display: flex; z-index: 1000; box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
        padding-bottom: var(--safe-area-bottom); align-items: center;
    }
    @media (min-width: 768px) { .mobile-nav { display: none; } }
    .mobile-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: transparent; color: var(--text-muted); }
    .mobile-nav-btn.active { color: var(--primary); }

    /* ========== MOBILE OVERRIDES (FIXED OVERLAP) ========== */
    @media (max-width: 767px) {
        .app-layout { position: fixed; top: var(--header-h); bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; height: auto; }
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            /* Added 120px to clear the navigation bar entirely */
            padding-bottom: calc(var(--mob-nav-h) + 120px) !important; 
            -webkit-overflow-scrolling: touch; 
        }
        .sidebar {
            position: fixed; top: var(--header-h); bottom: var(--mob-nav-h); right: 0;
            width: 280px; z-index: 150; transform: translate3d(100%, 0, 0);
            transition: transform .28s cubic-bezier(.4, 0, .2, 1);
        }
        .sidebar.open { transform: translate3d(0, 0, 0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 140; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    }

    /* ========== HOME, SECTION, SUMMARY STYLES ========== */
    .home-screen, .section-view, .summary-view { max-width: 900px; margin: 0 auto; }
    .home-hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: var(--radius); padding: 24px; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
    .meta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 499px) { .meta-grid { grid-template-columns: 1fr; } }
    .meta-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .meta-field input, .meta-field select { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-family: inherit; }

    .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .nav-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }

    .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border-light); transition: background 0.12s; }
    .item-row.scored-2 { border-right: 4px solid var(--green); }
    .item-row.scored-1 { border-right: 4px solid var(--orange); }
    .item-row.scored-0 { border-right: 4px solid var(--red); }
    .item-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

    .sbtn, .sbtn-disabled { width: 38px; height: 34px; border: 2px solid var(--border); border-radius: 7px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .sbtn { background: var(--surface2); color: var(--text-muted); cursor: pointer; }
    .sbtn.s0 { background: var(--red-light); border-color: var(--red); color: var(--red); }
    .sbtn.s1 { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
    .sbtn.s2 { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .sbtn-disabled { background: #eee; color: #bbb; cursor: not-allowed; opacity: 0.5; }

    /* ========== INSTALL BANNER ========== */
    #installBanner {
        display: none; position: fixed; bottom: 0; left: 0; right: 0; 
        background: #e8f2fb; padding: 15px 16px; border-top: 2px solid #1a6faf; 
        text-align: center; z-index: 9999; box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
        /* iPhone Safe Area support */
        padding-bottom: calc(15px + env(safe-area-inset-bottom)) !important;
    }

    /* Modals & Toasts */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; border-radius: 24px; padding: 10px 20px; z-index: 2000; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1500; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 420px; }
</style>
</head>
<body>

    <div id="installBanner">
        <p style="margin:0 0 10px 0; font-weight:bold; font-size:14px;">📲 ثبّت التطبيق للعمل بدون إنترنت</p>
        <button id="btnInstall" style="background:#1a6faf; color:white; border:none; padding:10px 24px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:bold;">تثبيت الآن</button>
        <button id="btnCancel" style="background:transparent; color:#666; border:1px solid #ccc; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:13px; margin-right:10px;">ليس الآن</button>
    </div>

    <header class="app-header">
        <div class="header-logo">
            <div class="icon">🏥</div>
            <div class="header-titles">
                <div class="t1">نموذج متابعة المستشفيات</div>
                <div class="t2">مديرية الشئون الصحية بالاسكندرية</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="hbtn hbtn-ghost hbtn-desktop" onclick="openUploadDialog()">📂 فتح</button>
            <button class="hbtn hbtn-ghost hbtn-desktop" onclick="saveToLocal()">💾 حفظ</button>
            <button class="hbtn hbtn-accent" onclick="exportExcel()">📥 <span class="hbtn-desktop">تصدير Excel</span></button>
        </div>
    </header>

    <div class="global-progress"><div class="global-progress-fill" id="gProgressFill" style="width:0%"></div></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="app-layout">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <h3>أقسام النموذج</h3>
                <div class="sidebar-total"><span class="score-big" id="sbTotalScore">0</span><span>/ 1174</span></div>
            </div>
            <div class="sidebar-inner" id="sidebarNav"></div>
        </nav>
        <main class="main-content" id="mainContent"></main>
    </div>

    <nav class="mobile-nav">
        <button class="mobile-nav-btn" id="mnHome" onclick="showHome()">🏠 <span>الرئيسية</span></button>
        <button class="mobile-nav-btn" onclick="toggleSidebar()">☰ <span>الأقسام</span></button>
        <button class="mobile-nav-btn" onclick="saveToLocal()">💾 <span>حفظ</span></button>
        <button class="mobile-nav-btn" id="mnSummary" onclick="showSection('summary')">📈 <span>الملخص</span></button>
    </nav>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <p id="modalBody" style="margin: 15px 0;"></p>
            <div style="display:flex; gap:10px;">
                <button id="modalConfirm" style="flex:1; padding:10px; background:var(--red); color:#fff; border:none; border-radius:5px;">تأكيد</button>
                <button onclick="closeModal()" style="flex:1; padding:10px; background:#ccc; border:none; border-radius:5px;">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls" onchange="handleFileUpload(event)">

    <script>
        /* [DATA CONSTANTS - Same as provided in your original file] */
        const TEMPLATE_B64 = "..."; // Keep your base64 string here
        const ROW_MAP = { "general__0": 13 /* ... rest of map */ };
        const FORM_DATA = [ { "key": "general", "title": "الإشتراطات العامة", "max": 108, "subsections": [...] } /* ... rest of data */ ];

        /* [APPLICATION LOGIC - Same as provided in your original file] */
        // ... (Include your existing scores, meta, getSectionScore, etc. functions)

        // ═══════════════════════════════════════
        // INSTALL BANNER LOGIC (FIXED FOR iOS)
        // ═══════════════════════════════════════
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');
        const btnCancel = document.getElementById('btnCancel');

        // Check if already installed
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
        // Detect iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        // Android / Chrome Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) {
                installBanner.style.display = 'block';
            }

            btnInstall.addEventListener('click', () => {
                installBanner.style.display = 'none';
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            });
        });

        // iOS Logic (Manual Instruction)
        if (isIOS && !isStandalone) {
            installBanner.style.display = 'block';
            const bannerText = installBanner.querySelector('p');
            // Instruction for iOS users
            bannerText.innerHTML = '📲 لتثبيت التطبيق على آيفون: اضغط على زر <strong>المشاركة</strong> <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/IPhone_UI_Share_Icon.png" width="16"> ثم اختر <strong>"Add to Home Screen"</strong>.';
            // Hide the button as it doesn't work on iOS
            btnInstall.style.display = 'none';
        }

        btnCancel.addEventListener('click', () => { installBanner.style.display = 'none'; });
        window.addEventListener('appinstalled', () => { installBanner.style.display = 'none'; });

        /* [REMAINDER OF YOUR FUNCTIONS: showHome, showSection, setScore, etc.] */
        // ... (Keep your original logic for scoring, saving, and Excel export)

    </script>
</body>
</html>
